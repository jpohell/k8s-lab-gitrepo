expose:
  type: ingress
  ingress:
    hosts:
      core: harbor.local
      notary: notary.harbor.local
    controller: default
    annotations:
      kubernetes.io/ingress.class: nginx
    tls:
      enabled: false

externalURL: http://harbor.local

harborAdminPassword: "Harbor12345"

persistence:
  enabled: true
  resourcePolicy: "keep"
  persistentVolumeClaim:
    registry:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 50Gi
    chartmuseum:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
    jobservice:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi
    database:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 10Gi
    redis:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi
    trivy:
      storageClass: longhorn
      accessMode: ReadWriteOnce
      size: 5Gi

database:
  type: internal

redis:
  type: internal

chartmuseum:
  enabled: true

notary:
  enabled: false

trivy:
  enabled: true
  ignoreUnfixed: true
  skipUpdate: false
