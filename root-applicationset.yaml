apiVersion: argoproj.io/v1beta1
kind: ApplicationSet
metadata:
  name: root-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/<your-username>/gitops.git
        revision: main
        directories:
          - path: apps/**/*
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/<your-username>/gitops.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'
        createNamespace: true
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
